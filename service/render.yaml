services:
  - type: web
    name: rentaliq-data
    runtime: docker
    plan: free
    rootDir: service
    healthCheckPath: /health
    envVars:
      - key: API_KEY
        sync: false
      - key: HUD_API_TOKEN
        sync: false
      - key: CENSUS_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: RESO_BASE_URL
        sync: false
      - key: RESO_ACCESS_TOKEN
        sync: false
      - key: RESO_TOKEN_URL
        sync: false
      - key: RESO_CLIENT_ID
        sync: false
      - key: RESO_CLIENT_SECRET
        sync: false
      - key: ENABLE_SCRAPERS
        value: "true"
